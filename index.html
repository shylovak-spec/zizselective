<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Інформація про хімічні речовини</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            color: #374151;
            padding: 1rem;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background-color: #fff;
            border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .info-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .info-panel {
            background-color: #e5e7eb;
            border-radius: 1rem;
            padding: 1rem;
            text-align: left;
            width: 100%;
        }
        .info-panel ul {
            list-style-type: disc;
            padding-left: 1.5rem;
        }
        .info-panel li {
            margin-bottom: 0.5rem;
        }
        .list-item {
            background-color: #e5e7eb;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            display: block;
            text-decoration: none;
            color: #1f2937;
            font-weight: 600;
        }
        .list-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .fixed-image {
            width: 200px;
            height: 200px;
            object-fit: contain;
        }
        @media (min-width: 640px) {
            .container.detail-view {
                flex-direction: row;
                align-items: flex-start;
                justify-content: space-between;
                gap: 2rem;
            }
            .info-container {
                align-items: flex-start;
            }
            .content-section {
                flex-direction: row;
                justify-content: flex-start;
                gap: 2rem;
            }
            .image-and-buttons {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 1rem;
            }
            .image-and-buttons img {
                width: 200px;
                height: 200px;
            }
            .buttons-container {
                display: flex;
                flex-direction: column;
                gap: 0.75rem;
            }
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div id="appContainer" class="container">
        
        <div id="mainView" class="w-full">
            <h1 class="text-2xl font-bold mb-6 text-center sm:text-left"">Список хімічних речовин для дільниці селективного монтажу</h1>
            
            <div class="mb-6">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Пошук речовини за назвою..." 
                    class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm text-lg transition-all"
                    oninput="handleSearch()"
                >
            </div>

            <div id="substanceList" class="space-y-4">
                </div>
        </div>

        <div id="detailView" class="hidden relative w-full">
            <button onclick="showMainView()" class="absolute -top-12 left-0 text-black text-2xl font-bold transition-all duration-300 transform hover:scale-105">
                &larr;
            </button>
            <div id="detailContent" class="w-full flex flex-col sm:flex-row gap-8 mt-4">
                </div>
        </div>
    </div>

    <script>
        // Об'єкт з даними про хімічні речовини
        const substanceData = {
            'Адипінова кислота': {
                image: 'https://raw.githubusercontent.com/shylovak-spec/zizselective/refs/heads/main/images/adipic.webp',
                dangers: `<h3 class="font-bold text-lg mb-2">Небезпеки</h3><ul class="list-disc pl-5 text-gray-700"><li>Викликає серйозне подразнення очей (H319)</li></ul>`,
                actions: `<h3 class="font-bold text-lg mb-2">Дії при аварії</h3><ul class="list-disc pl-5 text-gray-700"><li><b>Потрапляння в очі:</b> Промити великою кількістю води протягом 15 хв</li></ul>`,
                protection: `<h3 class="font-bold text-lg mb-2">Засоби захисту</h3><ul class="list-disc pl-5 text-gray-700"><li>Рукавички для хімічного захисту</li><li>Повнолицьова маска з фільтр-патронами 3M™ 6051 A1 або 3M 6055/ 6057</li><li>Захисні окуляри закритого типу</li></ul>`,
                industrialApplication: `<h3 class="font-bold text-lg mb-2">Застосування на виробництві</h3><ul class="list-disc pl-5 text-gray-700"><li>Для чистки нозл</li></ul>`
            },
            'Спирт ізопропиловий': {
                image: 'https://raw.githubusercontent.com/shylovak-spec/ziz/refs/heads/main/images/shopping.webp',
                dangers: `<h3 class="font-bold text-lg mb-2">Небезпеки</h3><ul class="list-disc pl-5 text-gray-700"><li>Викликає серйозне подразнення очей (H319)</li><li>Може викликати сонливість або запаморочення (H336)</li><li>Дуже легкозаймиста рідина та випари (H225)</li></ul>`,
                actions: `<h3 class="font-bold text-lg mb-2">Дії при аварії</h3><ul class="list-disc pl-5 text-gray-700"><li><b>Потрапляння в очі:</b> Промити великою кількістю води протягом 10 хв</li><li><b>Отруєння при вдиханні:</b> Вивести на свіже повітря, послабити тісний одяг</li></ul>`,
                protection: `<h3 class="font-bold text-lg mb-2">Засоби захисту</h3><ul class="list-disc pl-5 text-gray-700"><li>Захисні рукавички гумові</li><li>Захисні окуляри закритого типу</li></ul>`,
                industrialApplication: `<h3 class="font-bold text-lg mb-2">Застосування на виробництві</h3><ul class="list-disc pl-5 text-gray-700"><li>Очищення електронних компонентів</li><li>Як розчинник жирів</li><li>Обслуговування зони принтеру та печі</li></ul>`
            },
            'Миючий засіб "Blitz"': {
                image: 'https://raw.githubusercontent.com/shylovak-spec/ziz/refs/heads/main/images/blitz.webp',
                dangers: `<h3 class="font-bold text-lg mb-2">Небезпеки</h3><ul class="list-disc pl-5 text-gray-700"><li>Викликає подразнення шкіри (H315)</li><li>Викликає серйозне пошкодження очей (H318)</li></ul>`,
                actions: `<h3 class="font-bold text-lg mb-2">Дії при аварії</h3><ul class="list-disc pl-5 text-gray-700"><li><b>Потрапляння в очі:</b> Промити великою кількістю води протягом 15 хв</li><li><b>Потрапляння на шкіру:</b> Змити великою кількістю води, зняти забруднений одяг</li></ul>`,
                protection: `<h3 class="font-bold text-lg mb-2">Засоби захисту</h3><ul class="list-disc pl-5 text-gray-700"><li>Захисні рукавички гумові</li><li>Захисні окуляри закритого типу або повнолицьова маска</li></ul>`,
                industrialApplication: `<h3 class="font-bold text-lg mb-2">Застосування на виробництві</h3><ul class="list-disc pl-5 text-gray-700"><li>Чищення обладнання та промислових приміщень</li></ul>`
            },
            'INTERFLUX IF 930': {
                image: 'https://raw.githubusercontent.com/shylovak-spec/zizselective/refs/heads/main/images/interflux.png',
                dangers: `<h3 class="font-bold text-lg mb-2">Небезпеки</h3><ul class="list-disc pl-5 text-gray-700"><li>Викликає подразнення шкіри (Н315)</li><li>Викликає серйозне подразнення очей (Н319)</li></ul>`,
                actions: `<h3 class="font-bold text-lg mb-2">Дії при аварії</h3><ul class="list-disc pl-5 text-gray-700"><li><b>Потрапляння в очі:</b> Промити водою протягом 10 хвилин</li></ul>`,
                protection: `<h3 class="font-bold text-lg mb-2">Засоби захисту</h3><ul class="list-disc pl-5 text-gray-700"><li>Захисні рукавички (нітрил >0,35 мм)</li><li>Захисні окуляри закритого типу</li></ul>`,
                industrialApplication: `<h3 class="font-bold text-lg mb-2">Застосування на виробництві</h3><ul class="list-disc pl-5 text-gray-700"><li>Для чистки нозл</li></ul>`
            },
            'FLUX FX16': {
                image: 'https://raw.githubusercontent.com/shylovak-spec/zizselective/refs/heads/main/images/aim-flux-thinner.jpg',
                dangers: `<h3 class="font-bold text-lg mb-2">Небезпеки</h3><ul class="list-disc pl-5 text-gray-700"><li>Може викликати алергічну реакцію шкіри (H317)</li><li>Викликає серйозне подразнення очей (H319)</li><li>Дуже легкозаймиста рідина та пари (H225)</li></ul>`,
                actions: `<h3 class="font-bold text-lg mb-2">Дії при аварії</h3><ul class="list-disc pl-5 text-gray-700"><li><b>Потрапляння на шкіру:</b> Негайно промити великою кількістю теплої води з милом</li></ul>`,
                protection: `<h3 class="font-bold text-lg mb-2">Засоби захисту</h3><ul class="list-disc pl-5 text-gray-700"><li>Хімічні захисні окуляри від бризок</li><li>Хімічно стійкі рукавички</li><li>Респіратор</li></ul>`,
                industrialApplication: `<h3 class="font-bold text-lg mb-2">Застосування на виробництві</h3><ul class="list-disc pl-5 text-gray-700"><li>Рідкий флюс для паяння</li></ul>`
            },
            'SelectIF 2040': {
                image: 'https://raw.githubusercontent.com/shylovak-spec/zizselective/refs/heads/main/images/SelectIF2040.jpeg',
                dangers: `<h3 class="font-bold text-lg mb-2">Небезпеки</h3><ul class="list-disc pl-5 text-gray-700"><li>Викликає подразнення шкіри (Н315)</li><li>Викликає серйозне подразнення очей (Н319)</li></ul>`,
                actions: `<h3 class="font-bold text-lg mb-2">Дії при аварії</h3><ul class="list-disc pl-5 text-gray-700"><li><b>Потрапляння в очі:</b> Промити великою кількістю води протягом 10 хвилин</li></ul>`,
                protection: `<h3 class="font-bold text-lg mb-2">Засоби захисту</h3><ul class="list-disc pl-5 text-gray-700"><li>Захисні рукавички (нітрил >0,35 мм)</li><li>Захисні окуляри закритого типу</li></ul>`,
                industrialApplication: `<h3 class="font-bold text-lg mb-2">Застосування на виробництві</h3><ul class="list-disc pl-5 text-gray-700"><li>Флюс для селективного паяння</li></ul>`
            },
            'Очисник Kontakt Chemie KONTAKT PCC': {
                image: 'https://raw.githubusercontent.com/shylovak-spec/zizDIP/refs/heads/main/PCC.webp',
                dangers: `<h3 class="font-bold text-lg mb-2">Небезпеки</h3><ul class="list-disc pl-5 text-gray-700"><li>Надзвичайно легкозаймистий аерозоль (H222)</li><li>Викликає подразнення шкіри (H315)</li><li>Викликає серйозне подразнення очей (H319)</li></ul>`,
                actions: `<h3 class="font-bold text-lg mb-2">Дії при аварії</h3><ul class="list-disc pl-5 text-gray-700"><li><b>Потрапляння в очі:</b> Промити великою кількістю води протягом 15 хв</li></ul>`,
                protection: `<h3 class="font-bold text-lg mb-2">Засоби захисту</h3><ul class="list-disc pl-5 text-gray-700"><li>Захисні рукавички гумові</li><li>Повнолицьова маска (фільтри 3M™ 6051 або 6055/6057)</li></ul>`,
                industrialApplication: `<h3 class="font-bold text-lg mb-2">Застосування на виробництві</h3><ul class="list-disc pl-5 text-gray-700"><li>Для видалення флюсу з плат</li></ul>`
            },
        };

        // Функція відображення списку речовин (тепер приймає рядок фільтрації)
        function renderList(filterText = '') {
            const substanceList = document.getElementById('substanceList');
            substanceList.innerHTML = ''; // Очищаємо список перед виведенням
            
            let hasResults = false;

            for (const substance in substanceData) {
                // Перевіряємо, чи назва речовини містить текст із пошуку (ігноруючи регістр)
                if (substance.toLowerCase().includes(filterText.toLowerCase())) {
                    hasResults = true;
                    const listItem = document.createElement('a');
                    listItem.href = '#';
                    listItem.classList.add('list-item');
                    listItem.textContent = substance;
                    listItem.onclick = (e) => {
                        e.preventDefault();
                        showDetailView(substance);
                    };
                    substanceList.appendChild(listItem);
                }
            }

            // Якщо нічого не знайдено, виводимо повідомлення
            if (!hasResults) {
                substanceList.innerHTML = '<p class="text-gray-500 text-center py-4">Речовин не знайдено за вашим запитом.</p>';
            }
        }

        // Функція, яка запускається щоразу, коли користувач щось пише в інпут
        function handleSearch() {
            const query = document.getElementById('searchInput').value;
            renderList(query);
        }

        function showMainView() {
            document.getElementById('mainView').classList.remove('hidden');
            document.getElementById('detailView').classList.add('hidden');
            document.getElementById('appContainer').classList.remove('detail-view');
        }

        function showDetailView(substanceName) {
            const data = substanceData[substanceName];
            if (!data) return;

            const detailContent = document.getElementById('detailContent');
            detailContent.innerHTML = `
                <div class="info-container w-full sm:w-1/2">
                    <h2 class="text-xl sm:text-2xl font-semibold mb-4 text-center sm:text-left">${substanceName}</h2>
                    <div class="image-and-buttons flex flex-col items-center">
                        <img src="${data.image}" alt="Зображення ${substanceName}" class="rounded-lg mb-4 sm:mb-0 fixed-image">
                        <div class="buttons-container w-full sm:w-auto">
                            <button onclick='showSubstanceInfo(${JSON.stringify(substanceName)}, "dangers")' class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-all duration-300 transform hover:scale-105 mb-2">Небезпеки</button>
                            <button onclick='showSubstanceInfo(${JSON.stringify(substanceName)}, "actions")' class="w-full bg-cyan-500 hover:bg-cyan-600 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-all duration-300 transform hover:scale-105 mb-2">Дії при аварії</button>
                            <button onclick='showSubstanceInfo(${JSON.stringify(substanceName)}, "protection")' class="w-full bg-lime-600 hover:bg-lime-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-all duration-300 transform hover:scale-105 mb-2">Засоби захисту</button>
                            <button onclick='showSubstanceInfo(${JSON.stringify(substanceName)}, "industrialApplication")' class="w-full bg-neutral-400 hover:bg-neutral-500 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-all duration-300 transform hover:scale-105">Застосування на виробництві</button>
                        </div>
                    </div>
                </div>
                <div id="substanceInfoDisplay" class="info-panel mt-4 sm:mt-0 w-full sm:w-1/2">
                    <p class="text-gray-600">Натисніть на одну з кнопок, щоб побачити інформацію.</p>
                </div>
            `;
            document.getElementById('mainView').classList.add('hidden');
            document.getElementById('detailView').classList.remove('hidden');
            document.getElementById('appContainer').classList.add('detail-view');
        }

        function showSubstanceInfo(substanceName, infoType) {
            const displayPanel = document.getElementById('substanceInfoDisplay');
            displayPanel.innerHTML = substanceData[substanceName][infoType];
        }

        // Запуск додатка: первинне виведення повного списку
        window.onload = () => {
            renderList();
        };
    </script>
</body>
</html>
